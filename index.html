<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>efood Agent Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    max-width: 400px;
    width: 90%;
  }

  .logo-wrap {
    width: 80px;
    height: 80px;
    background: #e8001c;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .logo-wrap img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #222;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  h1 span { color: #e8001c; }

  .badge {
    display: inline-block;
    background: #fff0f1;
    color: #e8001c;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 28px;
  }

  .input-group {
    margin-bottom: 12px;
    text-align: left;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #666;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-group input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #222;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  .input-group input:focus { border-color: #e8001c; }

  .input-group input.error {
    border-color: #e8001c;
    background: #fff8f8;
  }

  .error-msg {
    display: none;
    font-size: 12px;
    font-weight: 700;
    color: #e8001c;
    margin-top: 6px;
    padding-left: 4px;
  }

  .error-msg.show { display: block; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #e8001c;
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    transition: all 0.2s;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
  }

  .btn:hover:not(:disabled) {
    background: #c0001a;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,0,28,0.3);
  }

  .btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn.loading {
    background: #c0001a;
    pointer-events: none;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { display: none; }
  .btn.loading .btn-icon { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="efood-logo.svg" alt="efood" width="22" height="22" style="filter: brightness(0) invert(1);">
  </div>
  <h1>efood <span>Partner</span><br>Portal</h1>
  <div class="badge">Demo</div>

  <div class="input-group">
    <label>Vendor ID</label>
    <input
      type="text"
      id="vendorInput"
      placeholder="π.χ. 8901305"
      maxlength="20"
      autocomplete="off"
      oninput="onInputChange()"
      onkeydown="if(event.key==='Enter') doLogin()"
    >
    <div class="error-msg" id="errorMsg">Το κατάστημα δε βρέθηκε</div>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()" disabled>
    <span class="btn-icon">🏪</span>
    <span class="btn-text">Είσοδος στο Partner Portal</span>
    <div class="spinner"></div>
  </button>
</div>

<script>
  const SHEET_ID = '1fq2JCx0ydQxSLeusdfYuaI4A088VaDuUF_dcRX3Ikno';

  // Καθαρίζουμε το input αν ήρθαμε από logout
  window.addEventListener('load', function() {
    document.getElementById('vendorInput').value = '';
    document.getElementById('loginBtn').disabled = true;
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('vendorInput').classList.remove('error');
  });

  function onInputChange() {
    const val = document.getElementById('vendorInput').value.trim();
    document.getElementById('loginBtn').disabled = val.length === 0;
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('vendorInput').classList.remove('error');
  }

  async function doLogin() {
    const input = document.getElementById('vendorInput');
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const vendorId = input.value.trim();

    if (!vendorId) return;

    btn.classList.add('loading');
    btn.disabled = true;
    input.classList.remove('error');
    errorMsg.classList.remove('show');

    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Stores&t=${Date.now()}&_=${Math.random()}`;
      const res = await fetch(url, { cache: 'no-store' });
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rows = json.table.rows;

      let found = false;
      for (const row of rows) {
        if (row.c && row.c[1] && String(row.c[1].v) === vendorId) {
          found = true;
          break;
        }
      }

      if (found) {
        window.location.href = `partners.html?vendor=${encodeURIComponent(vendorId)}`;
      } else {
        input.classList.add('error');
        errorMsg.classList.add('show');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    } catch (e) {
      window.location.href = `partners.html?vendor=${encodeURIComponent(vendorId)}`;
    }
  }
</script>
</body>
</html>
