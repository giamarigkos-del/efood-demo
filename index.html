<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>efood Agent Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    max-width: 400px;
    width: 90%;
  }

  .logo-wrap {
    width: 80px;
    height: 80px;
    background: #e8001c;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .logo-wrap img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  .badge {
    display: inline-block;
    background: #fff0f1;
    color: #e8001c;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #222;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  h1 span { color: #e8001c; }

  p {
    font-size: 14px;
    color: #888;
    font-weight: 600;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #e8001c;
    color: white;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    transition: all 0.2s;
    width: 100%;
  }

  .btn:hover {
    background: #c0001a;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,0,28,0.3);
  }

  .footer {
    margin-top: 24px;
    font-size: 11px;
    color: #bbb;
    font-weight: 600;
  }
</style>
</head>
